<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Polaris Prof Inv — Options</title>
  <style>
    body { font: 14px/1.5 -apple-system, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; padding: 32px; max-width: 560px; }
    h1 { font-size: 18px; }
    label { display: block; margin: 18px 0 6px; font-weight: 600; font-size: 13px; }
    input { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; font-size: 13px; box-sizing: border-box; }
    button { margin-top: 20px; background: #0f766e; color: #fff; border: none; border-radius: 8px; padding: 10px 18px; font-weight: 600; cursor: pointer; }
    #status { margin-left: 12px; font-size: 13px; color: #4ade80; }
    p.hint { color: #94a3b8; font-size: 12.5px; }
  </style>
</head>
<body>
  <h1>Polaris — Attach Prof Inv</h1>
  <p class="hint">Connects this extension to Polaris so it can fetch generated Prof Inv PDFs. Ask IT for the access token.</p>

  <label for="who">Your name</label>
  <input id="who" placeholder="e.g. Maddie" />

  <label for="baseUrl">Polaris URL</label>
  <input id="baseUrl" placeholder="https://jls-navigator.m-peeters-4a0.workers.dev" />

  <label for="token">Access token</label>
  <input id="token" type="password" placeholder="paste the Polaris extension token" />

  <button id="save">Save</button><span id="status"></span>

  <script src="options.js"></script>
</body>
</html>
